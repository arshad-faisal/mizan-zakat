workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Setup project
        script: |
          cp pubspec.yaml pubspec.yaml.bak
          cp -r lib lib.bak
          flutter create --platforms android --project-name zakat_calculator --org com.mizanzakat . || true
          cp pubspec.yaml.bak pubspec.yaml
          rm -rf lib
          cp -r lib.bak lib

      - name: Fix settings.gradle
        script: |
          cat > android/settings.gradle << 'SETTINGSEOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.1.0" apply false
              id "org.jetbrains.kotlin.android" version "1.8.22" apply false
          }
          include ":app"
          SETTINGSEOF

      - name: Get dependencies
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - arshadfaisal786@gmail.com
