workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.22.3
    scripts:
      - name: Generate Android project
        script: |
          flutter create --platforms android --project-name zakat_calculator --org com.mizanzakat . || true

      - name: Fix pubspec.yaml
        script: |
          cat > pubspec.yaml << 'EOF'
          name: zakat_calculator
          description: Mizan Zakat - Free Zakat Calculator for Everyone.
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            geolocator: ^11.0.0
            geocoding: ^3.0.0
            http: ^1.2.0
            intl: ^0.20.2
            shared_preferences: ^2.2.0
            share_plus: ^9.0.0
            flutter_localizations:
              sdk: flutter

          flutter:
            uses-material-design: true
          EOF

      - name: Get dependencies
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - arshadfaisal786@gmail.com
