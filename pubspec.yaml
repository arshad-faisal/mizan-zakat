name: zakat_calculator
description: Mizan Zakat - Free Zakat Calculator for Everyone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^11.0.0
  url_launcher: ^6.3.0
  geocoding: ^3.0.0
  http: ^1.2.0
  intl: ^0.20.2
  shared_preferences: ^2.2.0
  share_plus: ^9.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

